<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>TT Confidence Hub - Operational Platform</title>
    <meta name="description" content="Territorial Tutoring's operational control system for training tutors, managing student transformation, and scaling Pod Vehicles using MPLEM." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif; background: #fafafa; }
      #root { min-height: 100vh; }
      #root-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #fafafa; z-index: 9999; }
      .loader-content { text-align: center; }
      .logo { font-size: 32px; font-weight: 700; color: #000; margin-bottom: 16px; }
      .spinner { width: 40px; height: 40px; border: 3px solid #e5e5e5; border-top: 3px solid #000; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .text { margin-top: 16px; font-size: 14px; color: #666; }
    </style>
  </head>
  <body>
    <div id="root-loader">
      <div class="loader-content">
        <div class="logo">TT</div>
        <div class="spinner"></div>
        <div class="text">Loading...</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const loader = document.getElementById('root-loader');
        if (loader) loader.style.display = 'none';
      });
    </script>
  </body>
</html>
