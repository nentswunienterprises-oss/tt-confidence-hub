<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Math Pressure Response Conditioning for Learners</title>
    <meta name="description" content="Understanding math is not enough - most students freeze or rush when pressure appears. Response Integrity trains how students respond when math gets difficult, closing the gap between knowing and executing when it matters most." />
    <meta name="robots" content="index, follow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif; background: #fafafa; overflow-x: hidden !important; }
      #root { min-height: 100vh; }
      #root-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #fafafa; z-index: 9999; }
      .loader-content { text-align: center; }
      .logo { display: flex; flex-direction: column; align-items: center; gap: 2px; margin-bottom: 16px; line-height: 0.95; text-transform: uppercase; }
      .logo-response { font-size: 18px; font-weight: 700; letter-spacing: 0.14em; color: #E63946; }
      .logo-integrity { font-size: 15px; font-weight: 700; letter-spacing: 0.18em; color: #111; }
      .spinner { width: 40px; height: 40px; border: 3px solid #e5e5e5; border-top: 3px solid #000; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .text { margin-top: 16px; font-size: 14px; color: #666; }
    </style>
  </head>
  <body>
    <div id="root-loader">
      <div class="loader-content">
        <div class="logo"><span class="logo-response">Response</span><span class="logo-integrity">Integrity</span></div>
        <div class="spinner"></div>
        <div class="text">Loading...</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Debug helper: run only when ?debug_overflow=1 is present in the URL.
      (function() {
        if (!location.search.includes('debug_overflow=1')) return;
        function outlineOverflowing() {
          const w = window.innerWidth || document.documentElement.clientWidth;
          const els = Array.from(document.querySelectorAll('body *'));
          let found = 0;
          els.forEach((el) => {
            try {
              const r = el.getBoundingClientRect();
              if (r.right > w + 1 || r.left < -1) {
                found++;
                el.classList.add('overflow-debug-outline');
                console.warn('Overflowing element', el, {left: r.left, right: r.right, width: r.width});
              }
            } catch (e) {
              // ignore
            }
          });
          if (!found) console.info('No overflowing elements detected');
        }

        // add debug style
        const s = document.createElement('style');
        s.textContent = `
          .overflow-debug-outline{outline:3px solid rgba(255,0,0,0.9)!important;}
        `;
        document.head.appendChild(s);

        window.addEventListener('load', () => setTimeout(outlineOverflowing, 300));
        window.addEventListener('resize', () => setTimeout(outlineOverflowing, 200));
      })();
    </script>
  </body>
</html>
